<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV8C</title>
<style>
body{font-family:Arial;background:#111;color:#fff;padding:10px}
.container{max-width:1000px;margin:auto;background:#1c1c1c;padding:15px;border-radius:10px}
input,select,textarea,button{width:100%;margin:5px 0;padding:8px;border-radius:6px;border:none}
button{background:#28a745;color:#fff;font-weight:bold}
.item{border:1px solid #444;padding:10px;margin:10px 0;border-radius:6px}
.seccion{display:none}
#preview{background:#000;padding:10px;margin-top:10px;white-space:pre-wrap}
</style>
</head>
<body>

<div class="container">
<h2>🚔 CV8C</h2>

<select id="tipo">
<option value="">Seleccionar acta</option>
<option value="cv8c">Control Poblacional</option>
<option value="911">Intervención 911</option>
</select>

<input id="interventor" placeholder="Interventor">
<input id="lugar" placeholder="Lugar">
<input id="fecha">
<input id="hora">

<!-- CV8C -->
<div id="sec_cv8c" class="seccion">
<h3>PERSONAS</h3>
<div id="cv_personas"></div>
<button onclick="addCVPersona()">+ Persona</button>

<h3>VEHÍCULOS</h3>
<div id="cv_vehiculos"></div>
<button onclick="addCVVehiculo()">+ Vehículo</button>
</div>

<!-- 911 -->
<div id="sec_911" class="seccion">
<input id="motivo" placeholder="Motivo">

<h3>PERSONAS</h3>
<div id="p911"></div>
<button onclick="addP911()">+ Persona</button>

<h3>VEHÍCULOS</h3>
<div id="v911"></div>
<button onclick="addV911()">+ Vehículo</button>

<h3>INTERVENCIÓN JUDICIAL</h3>
<select id="judicial">
<option>NO</option>
<option>SI</option>
</select>
<input id="juzgado" placeholder="Juzgado">
<input id="secretaria" placeholder="Secretaría">
<input id="fiscalia" placeholder="Fiscalía">
<input id="sumario" placeholder="Número de sumario">

<h3>SAME</h3>
<select id="same">
<option>NO</option>
<option>SI</option>
</select>
<input id="unidad" placeholder="Unidad SAME">
<input id="medico" placeholder="Médico">
<input id="matricula" placeholder="Matrícula">
<input id="destino" placeholder="Destino">
<input id="diagnostico" placeholder="Diagnóstico">
</div>

<button onclick="generar()">GENERAR</button>
<button onclick="whatsapp()">WHATSAPP</button>

<div id="preview"></div>
</div>

<script>

// AUTO FECHA HORA
window.onload=()=>{
 let d=new Date();
 fecha.value=d.toLocaleDateString();
 hora.value=d.getHours().toString().padStart(2,'0')+":"+d.getMinutes().toString().padStart(2,'0');
};

// CAMBIO SECCIÓN
document.getElementById("tipo").addEventListener("change",()=>{
 let tipo=document.getElementById("tipo").value;
 document.querySelectorAll(".seccion").forEach(s=>s.style.display="none");
 if(tipo==="cv8c") document.getElementById("sec_cv8c").style.display="block";
 if(tipo==="911") document.getElementById("sec_911").style.display="block";
});

// CV8C
function addCVPersona(){
 let d=document.createElement("div");
 d.className="item";
 d.innerHTML='<input placeholder="Nombre y Apellido"><input placeholder="DNI">';
 cv_personas.appendChild(d);
}

function addCVVehiculo(){
 let d=document.createElement("div");
 d.className="item";
 d.innerHTML='<input placeholder="Dominio"><input placeholder="Marca"><input placeholder="Modelo">';
 cv_vehiculos.appendChild(d);
}

// 911
function addP911(){
 let d=document.createElement("div");
 d.className="item";
 d.innerHTML=`
<select>
<option>IMPUTADO</option>
<option>DAMNIFICADO</option>
<option>TESTIGO</option>
<option>OTRO</option>
</select>
<input placeholder="Nombre y Apellido">
<input placeholder="DNI">
<input placeholder="Fecha nacimiento">
<input placeholder="Edad">
<input placeholder="Nacionalidad">
<input placeholder="Estado civil">
<input placeholder="Ocupación">
<input placeholder="Domicilio real">
<input placeholder="Domicilio legal">
<input placeholder="Localidad">
<input placeholder="Teléfono">
<input placeholder="Padre">
<input placeholder="Madre">
<select>
<option>Primario completo</option>
<option>Primario incompleto</option>
<option>Secundario completo</option>
<option>Secundario incompleto</option>
<option>Universitario</option>
<option>Terciario</option>
<option>OTRO</option>
</select>`;
 p911.appendChild(d);
}

function addV911(){
 let d=document.createElement("div");
 d.className="item";
 d.innerHTML=`
<input placeholder="Dominio">
<input placeholder="Marca">
<input placeholder="Modelo">
<input placeholder="Color">
<input placeholder="Chasis">
<input placeholder="Motor">
<input placeholder="Titular del vehículo">`;
 v911.appendChild(d);
}

// GENERAR
function generar(){
 let tipo=document.getElementById("tipo").value;
 let txt="";

if(tipo==="cv8c"){
 txt="*CV 8C*\n*CONTROL POBLACIONAL*\n\n";
 txt+="*INTERVENTOR:* "+interventor.value+"\n\n";
 txt+="*LUGAR:* "+lugar.value+"\n\n";
 txt+="*HORA:* "+hora.value+"\n\n";
 txt+="*PERSONAS:*\n";

 document.querySelectorAll("#cv_personas .item").forEach((p,i)=>{
  let d=p.querySelectorAll("input");
  txt+=(i+1)+")\n"+d[0].value+"\nDNI: "+d[1].value+"\n\n";
 });

 txt+="Los mismos al ser cursados por sistema IDGE (POC), corresponden y no poseen impedimentos legal vigentes.\n\n";

 txt+="*VEHICULOS/MOTOVEHICULOS:*\n";
 document.querySelectorAll("#cv_vehiculos .item").forEach((v,i)=>{
  let d=v.querySelectorAll("input");
  txt+=(i+1)+") "+d[0].value+" "+d[1].value+" "+d[2].value+"\n";
 });
}

if(tipo==="911"){
 txt="*CV 8C*\n\n";
 txt+="INTERVENTOR: "+interventor.value+"\n";
 txt+="FECHA: "+fecha.value+"\n";
 txt+="HORA: "+hora.value+"\n";
 txt+="LUGAR: "+lugar.value+"\n";
 txt+="MOTIVO: "+motivo.value+"\n\n";

 txt+="PERSONAS:\n";
 document.querySelectorAll("#p911 .item").forEach((p,i)=>{
  let d=p.querySelectorAll("input,select");
  txt+=(i+1)+") "+d[1].value+" ("+d[0].value+")\n";
  txt+="DNI: "+d[2].value+"\n";
  txt+="NAC: "+d[3].value+"\n";
  txt+="EDAD: "+d[4].value+"\n";
  txt+="NACIONALIDAD: "+d[5].value+"\n";
  txt+="ESTADO CIVIL: "+d[6].value+"\n";
  txt+="OCUPACION: "+d[7].value+"\n";
  txt+="DOM REAL: "+d[8].value+"\n";
  txt+="DOM LEGAL: "+d[9].value+"\n";
  txt+="LOCALIDAD: "+d[10].value+"\n";
  txt+="TEL: "+d[11].value+"\n";
  txt+="PADRE: "+d[12].value+"\n";
  txt+="MADRE: "+d[13].value+"\n";
  txt+="EDUCACION: "+d[14].value+"\n\n";
 });

 txt+="VEHICULOS:\n";
 document.querySelectorAll("#v911 .item").forEach((v,i)=>{
  let d=v.querySelectorAll("input");
  txt+=(i+1)+") "+d[0].value+" "+d[1].value+" "+d[2].value+" COLOR:"+d[3].value+" CHASIS:"+d[4].value+" MOTOR:"+d[5].value+" TITULAR:"+d[6].value+"\n";
 });

 if(judicial.value==="SI"){
 txt+="\nINTERVENCION JUDICIAL:\nJUZGADO:"+juzgado.value+"\nSECRETARIA:"+secretaria.value+"\nFISCALIA:"+fiscalia.value+"\nSUMARIO:"+sumario.value+"\n";
 }

 if(same.value==="SI"){
 txt+="\nSAME:\nUnidad:"+unidad.value+"\nMedico:"+medico.value+"\nMatricula:"+matricula.value+"\nDestino:"+destino.value+"\nDiagnostico:"+diagnostico.value+"\n";
 }
}

preview.innerText=txt;
window._txt=txt;
}

// WHATSAPP
function whatsapp(){
 if(!window._txt){alert("Generar primero");return;}
 window.location.href="https://wa.me/?text="+encodeURIComponent(window._txt);
}

</script>

</body>
</html>
